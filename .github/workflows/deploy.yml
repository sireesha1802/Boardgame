name: Deploy Application to Kubernetes

on:
  push:
    branches:
      - main


env:
  IMAGE_NAME: sireeshahub1802/board


jobs:

  build-deploy:

    runs-on: ubuntu-latest


    steps:

    # Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4


    # Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'


    # Maven Build
    - name: Maven Build
      run: |
        mvn clean package
